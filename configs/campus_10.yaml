        battery.battery_type: none,
        building_load.peak_kw_scaling: false,
      }
    noise_profile: clean
    weather_profile: moderate
    seed: 9000

  # 10. Conference/mixed center — visitors, DCFC fast chargers, carport PV + LFP 4h
  - base_scenario: S01
    descriptors:
      {
        building: mixed_use_v1,
        location: san_jose_ca,
