      }
    overrides:
      {
        ev_fleet.ev_count: 35,
        charging_infra.charger_count: 35,
        pv.pv_type: rooftop_large,
        battery.battery_type: nmc_2h,
        building_load.peak_kw_scaling: false,
      }
    noise_profile: clean
    weather_profile: slight
    seed: 6000

  # 7. Strip-mall amenities — evening-peaking visitors, V1G, carport PV + LFP 2h
