# populations.yaml — Population descriptor library (Step 5.5 per-population policy)
#
# Each entry resolves into knobs:
#   user_behavior.axes_distribution (region grid over (φ, κ, δ))
#   user_behavior.negotiation_mix
#   user_behavior.w_multiplier
#   ev_fleet.ev_count, battery_mix, battery_heterogeneity
#
# Per-user sampling:
#   1. Region assigned ~ Categorical(weights)
#   2. (φ, κ, δ) ~ Uniform within region bounds
#   3. negotiation_type ~ Categorical(negotiation_mix)
#   4. (w1, w2) ~ Normal(cluster mean, cluster std) clipped ≥ 0; scaled by w_multiplier
#   5. battery_class ~ Categorical(battery_mix)
#
# calibration_policy controls how region_distributions parameters are sourced:
#   acn_data  — ACN-Data fitted; region grid is ACN-anchored.
#               `v2b-syndata calibrate` writes region_distributions on this entry.
#   synthetic — region_distributions hand-authored from domain knowledge.
#               `v2b-syndata calibrate` skips this entry.
# See CALIBRATION_NOTES.md item #11 for the policy split rationale.

# ──────────────────────────────────────────────────────────────────────────
# CONSENT-default mixed-flex baseline (S01, used in CONSENT validation).
# Hand-authored — domain knowledge, not data fit. The 5 region archetypes
# are the canonical CONSENT axes; their distribution parameters are set
# from typical-charging-pattern intuition.
# ──────────────────────────────────────────────────────────────────────────
consent_default:
  description: "Mixed-flex CONSENT-empirical baseline — covers all 5 region archetypes"
  calibration_policy: synthetic

  axes_distribution:
    - {name: stable_commuter, freq: [0.85, 1.00], consist: [0.75, 1.00], dist_km: [
        40, 80], weight: 0.35}
    - {name: flexible_local, freq: [0.70, 0.95], consist: [0.50, 0.80], dist_km: [
        5, 15], weight: 0.25}
    - {name: irregular_distant, freq: [0.40, 0.70], consist: [0.20, 0.50], 
        dist_km: [40, 100], weight: 0.20}
    - {name: occasional_visitor, freq: [0.05, 0.20], consist: [0.10, 0.40], 
        dist_km: [3, 50], weight: 0.10}
    - {name: erratic, freq: [0.30, 0.70], consist: [0.05, 0.30], dist_km: [5, 80],
      weight: 0.10}

  negotiation:
    cluster_mix: [0.107, 0.536, 0.321, 0.036]
    w_multiplier: [1.0, 1.0]

  fleet:
    ev_count: 20
    battery_mix: [0.20, 0.30, 0.40, 0.10]
    battery_heterogeneity: mixed

  region_distributions:
    # stable_commuter: morning office arrivals, 8-9h workday, mid-low arrival SoC.
    stable_commuter:
      arrival: {mu: 8.5, sigma: 0.8}        # ~8:30 ± 30min, weekday office onset
      dwell: {k: 2.2, lambda: 9.0}          # ~9h workday; k>2 → tight unimodal peak
      soc_arrival: {alpha: 4.0, beta: 6.0}  # E≈0.40 — long commute, mid-discharge
      copula: {rho_gaussian: -0.3}          # earlier arrivers stay slightly longer

    # flexible_local: mid-morning arrivals, ~6h dwell, balanced arrival SoC.
    flexible_local:
      arrival: {mu: 9.5, sigma: 1.5}        # ~9:30 ± 1.5h, late office or part-day
      dwell: {k: 1.8, lambda: 6.5}          # ~6h dwell; broader than commuters
      soc_arrival: {alpha: 5.0, beta: 5.0}  # E≈0.50 — short commutes, less discharge
      copula: {rho_gaussian: -0.2}

    # irregular_distant: scattered arrivals, ~4h dwell, low arrival SoC (long range).
    irregular_distant:
      arrival: {mu: 10.0, sigma: 2.5}       # ~10:00 ± 2.5h, irregular
      dwell: {k: 1.5, lambda: 4.0}          # ~4h dwell; long-range driver charges + leaves
      soc_arrival: {alpha: 3.0, beta: 7.0}  # E≈0.30 — significant discharge
      copula: {rho_gaussian: -0.1}

    # occasional_visitor: midday peak, short stays, balanced SoC.
    occasional_visitor:
      arrival: {mu: 13.0, sigma: 3.0}       # ~13:00 ± 3h, lunchtime + afternoon
      dwell: {k: 1.5, lambda: 2.0}          # ~2h dwell — quick top-up
      soc_arrival: {alpha: 4.0, beta: 4.0}  # E≈0.50 — random
      copula: {rho_gaussian: 0.0}

    # erratic: very wide arrival, short dwell, mid SoC. Random walk-ins.
    erratic:
      arrival: {mu: 11.0, sigma: 4.0}       # broadest arrival window
      dwell: {k: 1.2, lambda: 3.0}          # tail-heavy dwell
      soc_arrival: {alpha: 3.0, beta: 5.0}  # E≈0.375
      copula: {rho_gaussian: 0.0}

# ──────────────────────────────────────────────────────────────────────────
# ACN-anchored workplace baseline. Region grid matches where ACN-Data users
# actually live in (φ, κ) space (after the per-user-window φ fix).
# region_distributions populated by `v2b-syndata calibrate`.
