  axes_distribution:
    # Region bounds anchored on per-user-window φ histogram from the 646-user
    # ACN cohort. See CALIBRATION_NOTES.md item #11 for the histogram.
    # Initial weights: equal-share placeholder; tune from empirical user share
    # after first calibration run reports per-region n_users.
    - {name: rare_consistent, freq: [0.0, 0.1], consist: [0.5, 1.0], dist_km: [3,
        50], weight: 0.40}
    - {name: rare_inconsistent, freq: [0.0, 0.1], consist: [0.0, 0.5], dist_km: [
        3, 80], weight: 0.20}
    - {name: occasional_consistent, freq: [0.1, 0.3], consist: [0.5, 1.0], 
        dist_km: [5, 60], weight: 0.20}
    - {name: regular_charger, freq: [0.3, 1.0], consist: [0.4, 1.0], dist_km: [
            10, 80], weight: 0.15}
    - {name: erratic, freq: [0.0, 0.5], consist: [0.0, 0.4], dist_km: [3, 80], 
        weight: 0.05}

  negotiation:
    cluster_mix: [0.107, 0.536, 0.321, 0.036]
