# S_dr_cbp.yaml — PG&E CBP closure scenario
#
# San Francisco summer window. CBP runs May–Oct. lambda_base ramped above
# the 0.05/hr default so the closure test has visible events in the 3-month
# window without depending on subtle rate-tuning.

scenario_id: S_dr_cbp
description: "San Francisco summer — PG&E CBP, medium office"

descriptors:
  location:   san_francisco_ca
  building:   medium_office_v1
  population: consent_default
  equipment:  balanced_50pct
  noise:      clean

overrides:
  sim_window.mode: custom
  sim_window.start: '2020-06-01'
  sim_window.custom_end: '2020-09-01'
  utility_rate.dr_lambda_base: 0.05
