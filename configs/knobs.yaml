# knobs.yaml — full tunable knob registry (v2, post-D28)
#
# Schema is fixed (see 01_data_schema.md); knobs are tunable parameters.
#
# Resolution chain at generation time:
#   1. CLI override (--knob_overrides)
#   2. Scenario YAML overrides (scenario_yaml.overrides[knob])
#   3. Descriptor expansion (Tier 0 library lookup)
#   4. default field below
#
# Manifest records source per knob: explicit | descriptor:<name> | default
#
# Type system:
#   int, float, bool, categorical, simplex, vec2, list[vec2], list[region],
#   timestamp, path

# ──────────────────────────────────────────────────────────────────────────
# Bucket 1: EV Fleet
# ──────────────────────────────────────────────────────────────────────────
ev_fleet:

  ev_count:
    type: int
    range: [1, 1000]
    default: 20
    description: "Number of distinct EVs in fleet"
    affects_csv: [cars.csv, sessions.csv, users.csv]

  battery_mix:
    type: simplex
    components: [leaf_24, bolt_40, m3_75, rivian_100]
    default: [0.20, 0.30, 0.40, 0.10]
    description: "Battery class distribution. Capacities: 24, 40, 75, 100 kWh. Capacity flows to D5 reachability check at sessions.py:170 — couples to sessions.csv via rejection sampling."
    affects_csv: [cars.csv, sessions.csv]

  battery_heterogeneity:
    type: categorical
    choices: [homog, mixed]
    default: mixed
    description: "Per-car capacity variance mode. Couples to sessions via D5 rejection sampling (see battery_mix)."
    affects_csv: [cars.csv, sessions.csv]

  battery_mix_dirichlet_alpha:
    type: float
    range: [1.0, 1000000.0]
    default: 1000000.0
    description: "Dirichlet concentration α for per-sample battery mix noise. Default 1e6 = effectively off (preserves bitwise reproducibility). Batch mode uses α=30 → std ~8% per component (declared p·α form). Set high to disable."
    affects_csv: [cars.csv]

  min_allowed_soc:
    type: float
    range: [0.0, 100.0]
    default: 10.0
    description: "Lower SoC bound (%) applied to EVERY car in cars.csv, overriding the per-battery-class default. Default 10 matches the battery-class spec (bit-identical). Flows into the arrival-SoC clamp band (sessions_dist.py)."
    affects_csv: [cars.csv, sessions.csv]

  max_allowed_soc:
    type: float
    range: [0.0, 100.0]
    default: 90.0
    description: "Upper SoC bound (%) applied to EVERY car in cars.csv, overriding the per-battery-class default. Default 90 (typical real-world charge ceiling; was 100 pre-2026-06). Caps required_soc_at_depart and the arrival-SoC band."
    affects_csv: [cars.csv, sessions.csv]

# ──────────────────────────────────────────────────────────────────────────
# Bucket 2: Charging Infrastructure
# ──────────────────────────────────────────────────────────────────────────
charging_infra:

  charger_count:
    type: int
    range: [1, 500]
    default: 20
    affects_csv: [chargers.csv]

  directionality_frac:
    type: float
    range: [0.0, 1.0]
    default: 0.50
    description: "Fraction of chargers that are bidirectional"
    affects_csv: [chargers.csv]

  uni_rate_kw:
    type: float
    range: [3.3, 350.0]
    default: 20.0
    description: "Max kW for unidirectional chargers. Gates D5 reachability at sessions.py:168-173 — couples to sessions.csv via rejection sampling."
    affects_csv: [chargers.csv, sessions.csv]

  bi_rate_kw:
    type: float
    range: [3.3, 350.0]
    default: 20.0
    description: "Symmetric ± rate for bidirectional chargers. Same D5 coupling as uni_rate_kw."
    affects_csv: [chargers.csv, sessions.csv]

# ──────────────────────────────────────────────────────────────────────────
# Bucket 3: User Behavior (axis-based, per D24)
# ──────────────────────────────────────────────────────────────────────────
user_behavior:

  axes_distribution:
    type: list[region]
    default:
      - {name: stable_commuter,    freq: [0.85, 1.00], consist: [0.75, 1.00], dist_km: [40, 80],  weight: 0.35}
      - {name: flexible_local,     freq: [0.70, 0.95], consist: [0.50, 0.80], dist_km: [5, 15],   weight: 0.25}
      - {name: irregular_distant,  freq: [0.40, 0.70], consist: [0.20, 0.50], dist_km: [40, 100], weight: 0.20}
      - {name: occasional_visitor, freq: [0.05, 0.20], consist: [0.10, 0.40], dist_km: [3, 50],   weight: 0.10}
      - {name: erratic,            freq: [0.30, 0.70], consist: [0.05, 0.30], dist_km: [5, 80],   weight: 0.10}
    description: "Region-grid distribution over (φ, κ, δ) axes. Weights must sum to 1. Per-user values sampled uniformly within assigned region."
    affects_csv: [users.csv, sessions.csv]

  negotiation_mix:
    type: simplex
    components: [type_i, type_ii, type_iii, type_iv]
    default: [0.107, 0.536, 0.321, 0.036]
    description: "CONSENT empirical (n=28 survey)"
    affects_csv: [users.csv]

  w_multiplier:
    type: vec2
    range: [[0.1, 5.0], [0.1, 5.0]]
    default: [1.0, 1.0]
    description: "(α_w1, α_w2) global scale on CONSENT (w1, w2). E5 sweep lever."
    affects_csv: [users.csv]

  min_depart_soc:
    type: float
    range: [0.0, 1.0]
    default: 0.40
    description: "Behavioral floor on required_soc_at_depart (D7). A discretionary prior, NOT a hard constraint — the only structural rule is required_soc_at_depart > arrival_soc (D6). Default 0.40 (paired with depart_soc_mu=50): synthetic EVs leave roughly half-charged with a 40% floor on the low tail. Data-calibrated cohorts set it to 0.0 so the empirical departure-SoC (region_distributions.soc_depart) is not clamped by an arbitrary floor."
    affects_csv: [sessions.csv]

  depart_soc_mu:
    type: float
    range: [0.0, 100.0]
    default: 50.0
    description: "Mean (%) of the fallback TruncNorm for required_soc_at_depart, used only by uncalibrated/synthetic populations (no region_distributions.soc_depart). Calibrated cohorts use the fitted soc_depart Beta and ignore this. Default 50 → synthetic EVs depart roughly half-charged (paired with min_depart_soc=0.40). (Pre-2026-06 default was 85.)"
    affects_csv: [sessions.csv]

  depart_soc_sigma:
    type: float
    range: [0.1, 50.0]
    default: 5.0
    description: "Std (%) of the fallback TruncNorm for required_soc_at_depart (paired with depart_soc_mu). Uncalibrated/synthetic populations only. Default 5 reproduces the prior hardcoded value. Must be > 0."
    affects_csv: [sessions.csv]

  weekend_activity_factor:
    type: float
    range: [0.0, 5.0]
    default: 1.0
    description: "Weekend appearance rate as a fraction of the weekday rate φ. A car's per-day appearance probability is φ on weekdays and φ·weekend_activity_factor on Sat/Sun. Calibrated populations set this from real data (write_region_distributions stamps calibration_metadata.weekend_activity_factor; ≈0.08–0.38 for ACN/ElaadNL workplaces); hand-authored populations keep the 1.0 default. Has no effect unless sim_window.weekdays_only is false (which forces it to 0)."
    affects_csv: [sessions.csv]

  axes_distribution_dirichlet_alpha:
    type: float
    range: [1.0, 1000000.0]
    default: 1000000.0
    description: "Dirichlet concentration α for per-sample region-weight noise on axes_distribution. Default 1e6 = effectively off (preserves bitwise reproducibility). Batch mode uses α=30 → std ~8% per region weight (Dirichlet(p·α) form). Set high to disable."
    affects_csv: [users.csv, sessions.csv]

  external_charge_cost:
    type: float
    range: [0.10, 1.00]
    default: 0.30
    description: "Outside-option price ($/kWh). CONSENT default."
    affects_csv: []

  menu_levels:
    type: list[vec2]
    default:
      - [0.0,    0]
      - [0.0625, 30]
      - [0.10,   15]
      - [0.20,   105]
    description: "(Δe_max, Δt_max_min) per CONSENT negotiation level. Used for ψ canonical-menu computation."
    affects_csv: []

# ──────────────────────────────────────────────────────────────────────────
# Bucket 4: Building Load
# ──────────────────────────────────────────────────────────────────────────
building_load:

  climate:
    type: categorical
    choices: [temperate, cold, tropical, subtropical]
    default: temperate
    description: "[NOT CONNECTED] Display label for manifest/UI only. EnergyPlus weather is driven by building_load.tmyx_station — change THAT to switch climates. Pick a location descriptor (e.g. miami_fl) to set both together."
    affects_csv: []

  tmyx_station:
    type: path
    default: "USA_TN_Nashville.Intl.AP.723270_TMYx"
    description: "TMYx station ID (climate.onebuilding.org). Drives EnergyPlus weather. D37."
    affects_csv: [building_load.csv]

  weather_temp_offset_c:
    type: float
    range: [-15.0, 15.0]
    default: 0.0
    description: "Weather realization: additive °C offset applied to the EPW dry-bulb temperature EnergyPlus simulates AND to the exported weather_data.csv (kept in sync). Use per-sample draws (generate-multi --weather-sigma-c) to produce a weather-driven, physically-faithful load distribution for downstream learning."
    affects_csv: [building_load.csv, weather_data.csv]

  weather_solar_scale:
    type: float
    range: [0.5, 1.5]
    default: 1.0
    description: "Weather realization: multiplicative scale on the EPW solar channels (GHI/DNI/DHI) EnergyPlus simulates AND the exported weather_data.csv. 1.0 = unchanged."
    affects_csv: [building_load.csv, weather_data.csv]

  weather_dewpoint_offset_c:
    type: float
    range: [-15.0, 15.0]
    default: 0.0
    description: "Weather realization (humidity): additive °C offset on the EPW dew-point — the moisture variable EnergyPlus uses for latent load. relative_humidity_pct is recomputed (Magnus) from the perturbed dry-bulb + dew-point so the exported weather stays consistent. 0 = unchanged."
    affects_csv: [building_load.csv, weather_data.csv]

  weather_wind_scale:
    type: float
    range: [0.0, 3.0]
    default: 1.0
    description: "Weather realization: multiplicative scale on EPW wind speed EnergyPlus simulates (drives infiltration) AND the exported weather_data.csv. 1.0 = unchanged."
    affects_csv: [building_load.csv, weather_data.csv]

  archetype:
    type: categorical
    choices: [office, retail, mixed]
    default: office
    description: "DOE prototype building family"
    affects_csv: [building_load.csv]

  size:
    type: categorical
    choices: [small, med, large]
    default: med
    description: "DOE size bin"
    affects_csv: [building_load.csv]

  occupancy_source:
    type: categorical
    choices: [ashrae_90_1_office, ashrae_90_1_retail, ashrae_90_1_mixed, custom_path]
    default: ashrae_90_1_office
    description: "Base occupancy schedule. Modulates EnergyPlus building load only; sessions are population-driven (D24)."
    affects_csv: [building_load.csv]

  peak_kw:
    type: float
    range: [50.0, 5000.0]
    default: 500.0
    description: "Target peak building load. When peak_kw_scaling is true (default), EnergyPlus output is rescaled so max(power_kw) == peak_kw exactly — used for cross-scenario comparability. When false, raw EnergyPlus magnitudes flow through and this knob has no effect."
    affects_csv: [building_load.csv]

  peak_kw_scaling:
    type: bool
    default: true
    description: "Whether to rescale EnergyPlus output so the peak matches building_load.peak_kw. True (default) preserves existing cross-scenario comparability — shape varies with climate/archetype/size, magnitude is locked. False lets raw EnergyPlus magnitudes through, so e.g. Miami summer ≫ SF winter in absolute kW."
    affects_csv: [building_load.csv]

# ──────────────────────────────────────────────────────────────────────────
# Bucket 5: Utility Rate
# ──────────────────────────────────────────────────────────────────────────
utility_rate:

  tariff_type:
    type: categorical
    choices: [flat, TOU, demand_charge, DR]
    default: TOU
    description: "Energy-tariff schema. DR events are gated by dr_program, not tariff_type."
    affects_csv: [grid_prices.csv]

  energy_price_offpeak:
    type: float
    range: [0.05, 0.50]
    default: 0.137
    description: "Off-peak energy ($/kWh). CONSENT default = SVP commercial."
    affects_csv: [grid_prices.csv]

  energy_price_peak:
    type: float
    range: [0.05, 0.80]
    default: 0.178
    affects_csv: [grid_prices.csv]

  peak_window:
    type: vec2
    range: [[0, 23], [0, 23]]
    default: [6, 22]
    description: "(start_hour, end_hour) for peak pricing"
    affects_csv: [grid_prices.csv]

  demand_charge_per_kw:
    type: float
    range: [0.0, 50.0]
    default: 11.67
    description: "Monthly demand charge. Consumed by simulator; not rendered."
    affects_csv: []

  dr_program:
    type: categorical
    choices: [none, CBP, BIP, ELRP]
    default: none
    description: "DR program type. Determines notification lead, season, magnitude bounds."
    affects_csv: [dr_events.csv]

  dr_magnitude_kw_range:
    type: vec2
    range: [[0.0, 1000.0], [0.0, 1000.0]]
    default: [50.0, 200.0]
    description: "Per-event magnitude sample range (min, max kW)"
    affects_csv: [dr_events.csv]

  dr_lambda_base:
    type: float
    range: [0.0, 10.0]
    default: 0.05
    description: "Baseline Poisson rate (events/hour) before seasonal/temp/dow/tod modulation. Step 6: units corrected from events/day to events/hour per D63. Range widened to 10.0 to support sensitivity sweeps and cap-test scenarios."
    affects_csv: [dr_events.csv]

  dr_incentive_per_kw:
    type: float
    range: [0.0, 100.0]
    default: 1.0
    description: "DR incentive ($/kW) paid on the committed load-reduction. Not used by the native single-building generator; consumed by the optimus export layer to populate the 'incentive' column of the unified dso_commands.csv."
    affects_csv: []

  dr_penalty_per_kwh:
    type: float
    range: [0.0, 100.0]
    default: 1.0
    description: "DR penalty ($/kWh) charged on energy consumed in excess of the committed firm-service level. Not used by the native single-building generator; consumed by the optimus export layer to populate the 'penalty' column of the unified dso_commands.csv."
    affects_csv: []

# ──────────────────────────────────────────────────────────────────────────
# Bucket 6: Simulation Window (meta)
# ──────────────────────────────────────────────────────────────────────────
sim_window:

  mode:
    type: categorical
    choices: [month, full_year, custom]
    default: month
    description: "month = single calendar month anchored at runner's DEFAULT_SIM_START; length 28/29/30/31 per month. full_year = Jan 1 to Dec 31. custom = use custom_start/end."
    affects_csv: [building_load.csv, grid_prices.csv, sessions.csv, dr_events.csv]

  weekdays_only:
    type: bool
    default: true
    description: "When true (default), force a synthetic 5-day week: weekend appearance is hard-zeroed (weekend days are skipped entirely) regardless of user_behavior.weekend_activity_factor. Set false to emit calibrated weekend sessions at φ·weekend_activity_factor. Kept default-true so existing scenarios are unchanged; data-calibrated cohort scenarios set it false."
    affects_csv: [sessions.csv]

  start:
    type: timestamp
    default: null
    description: "Window anchor. mode=month snaps to first of containing month; mode=full_year snaps to Jan 1; mode=custom takes the literal value. Null → use runner DEFAULT_SIM_START."
    affects_csv: []

  custom_end:
    type: timestamp
    default: null
    description: "End of window. Only consulted when mode=custom."
    affects_csv: []

# ──────────────────────────────────────────────────────────────────────────
# Bucket 7: Noise (post-render perturbation, per D25)
# ──────────────────────────────────────────────────────────────────────────
noise:

  profile:
    type: categorical
    choices: [clean, light_noise, tmyx_stochastic, realistic_noise, adversarial, custom]
    default: clean
    description: "Named profile from configs/noise_profiles.yaml. 'tmyx_stochastic' adds bounded seed-driven variation for batch Monte Carlo evaluation; 'clean' is fully deterministic. 'custom' uses fields below."
    affects_csv: [building_load.csv, sessions.csv, grid_prices.csv, dr_events.csv]

  building_load_jitter_pct:
    type: float
    range: [0.0, 0.50]
    default: 0.0
    description: "Multiplicative Gaussian noise std on power_kw"
    affects_csv: [building_load.csv]

  arrival_time_jitter_min:
    type: float
    range: [0.0, 60.0]
    default: 0.0
    description: "Additive Gaussian noise std on arrival timestamps (minutes)"
    affects_csv: [sessions.csv]

  soc_arrival_jitter_pct:
    type: float
    range: [0.0, 0.30]
    default: 0.0
    affects_csv: [sessions.csv]

  dr_notification_dropout_prob:
    type: float
    range: [0.0, 1.0]
    default: 0.0
    description: "P(scheduled DR event missing from rendered file)"
    affects_csv: [dr_events.csv]

  price_jitter_pct:
    type: float
    range: [0.0, 0.30]
    default: 0.0
    affects_csv: [grid_prices.csv]

  occupancy_jitter_pct:
    type: float
    range: [0.0, 0.30]
    default: 0.0
    affects_csv: [building_load.csv]

  load_flex_jitter_pct:
    type: float
    range: [0.0, 0.50]
    default: 0.0
    description: "Multiplicative Gaussian std on the EnergyPlus flex (HVAC) load, applied post-simulation. Default 0.0 → load is the exact f(weather) physics output (clean profile). Non-clean profiles set 0.05 (the historical BAYES_NET measurement noise)."
    affects_csv: [building_load.csv]

  load_inflex_jitter_pct:
    type: float
    range: [0.0, 0.50]
    default: 0.0
    description: "Multiplicative Gaussian std on the EnergyPlus inflex (lights+plug) load, post-simulation. Default 0.0 → deterministic; non-clean profiles set 0.03."
    affects_csv: [building_load.csv]
