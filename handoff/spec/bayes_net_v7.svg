<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 1080" font-family="system-ui, -apple-system, sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.tier-label { font-size: 17px; font-weight: 600; fill: #2C2C2A; }
.tier-sub { font-size: 12px; fill: #5F5E5A; }
.node-title { font-size: 16px; font-weight: 600; }
.node-sub { font-size: 11px; }
.legend { font-size: 12px; fill: #444441; }
.note { font-size: 11px; font-style: italic; fill: #5F5E5A; }
.descriptor-fill { fill: #FFE7C2; stroke: #B86E0E; stroke-width: 1.2; }
.descriptor-text-title { fill: #5C2D04; }
.descriptor-text-sub { fill: #7A4108; }
.root-fill { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 1; }
.root-text-title { fill: #2C2C2A; }
.root-text-sub { fill: #444441; }
.entity-fill { fill: #E5E1F4; stroke: #6B5DC4; stroke-width: 1.4; }
.entity-text-title { fill: #1F1A4A; }
.entity-text-sub { fill: #36307A; }
.latent-fill { fill: #EEEDFE; stroke: #534AB7; stroke-width: 1; }
.latent-text-title { fill: #26215C; }
.latent-text-sub { fill: #3C3489; }
.output-fill { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
.output-text-title { fill: #04342C; }
.noise-fill { fill: #FCE2E2; stroke: #993556; stroke-width: 1.2; }
.noise-text-title { fill: #5C0F1F; }
.causal-edge { stroke: #5F5E5A; stroke-width: 1.2; fill: none; }
.descriptor-edge { stroke: #B86E0E; stroke-width: 1.2; fill: none; }
.entity-edge { stroke: #6B5DC4; stroke-width: 1.4; fill: none; }
.occupancy-edge { stroke: #534AB7; stroke-width: 1.6; fill: none; }
.weather-edge { stroke: #1B6F8C; stroke-width: 1.4; fill: none; }
.copula-edge { stroke: #534AB7; stroke-width: 1.4; stroke-dasharray: 5 3; fill: none; }
.noise-edge { stroke: #993556; stroke-width: 1.0; stroke-dasharray: 2 2; fill: none; }
.long-edge { stroke: #888780; stroke-width: 0.9; fill: none; }
</style>
</defs>

<rect width="1300" height="1080" fill="white"/>

<text class="tier-label" x="40" y="32">Tier 0 — User-facing descriptors</text>
<text class="tier-sub" x="40" y="50">Named bundles in scenario YAML; resolved via library files</text>

<g>
<rect x="120" y="68" width="200" height="60" rx="10" class="descriptor-fill"/>
<text class="node-title descriptor-text-title" x="220" y="92" text-anchor="middle">Location</text>
<text class="node-sub descriptor-text-sub" x="220" y="112" text-anchor="middle">e.g. nashville_tn</text>
</g>

<g>
<rect x="370" y="68" width="200" height="60" rx="10" class="descriptor-fill"/>
<text class="node-title descriptor-text-title" x="470" y="92" text-anchor="middle">Building</text>
<text class="node-sub descriptor-text-sub" x="470" y="112" text-anchor="middle">e.g. medium_office_v1</text>
</g>

<g>
<rect x="620" y="68" width="200" height="60" rx="10" class="descriptor-fill"/>
<text class="node-title descriptor-text-title" x="720" y="92" text-anchor="middle">Population</text>
<text class="node-sub descriptor-text-sub" x="720" y="112" text-anchor="middle">axes + nego + fleet</text>
</g>

<g>
<rect x="870" y="68" width="200" height="60" rx="10" class="descriptor-fill"/>
<text class="node-title descriptor-text-title" x="970" y="92" text-anchor="middle">Equipment</text>
<text class="node-sub descriptor-text-sub" x="970" y="112" text-anchor="middle">e.g. balanced_50pct</text>
</g>

<text class="tier-label" x="40" y="180">Tier 1 — Exogenous roots</text>
<text class="tier-sub" x="40" y="198">Resolved from descriptors via library files</text>

<g>
<rect x="40" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="90" y="240" text-anchor="middle">C</text>
<text class="node-sub root-text-sub" x="90" y="260" text-anchor="middle">climate</text>
</g>

<g>
<rect x="155" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="205" y="240" text-anchor="middle">W</text>
<text class="node-sub root-text-sub" x="205" y="260" text-anchor="middle">weather</text>
</g>

<g>
<rect x="270" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="320" y="240" text-anchor="middle">T</text>
<text class="node-sub root-text-sub" x="320" y="260" text-anchor="middle">tariff</text>
</g>

<g>
<rect x="385" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="435" y="240" text-anchor="middle">A</text>
<text class="node-sub root-text-sub" x="435" y="260" text-anchor="middle">archetype</text>
</g>

<g>
<rect x="500" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="550" y="240" text-anchor="middle">S</text>
<text class="node-sub root-text-sub" x="550" y="260" text-anchor="middle">size</text>
</g>

<g>
<rect x="615" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="665" y="240" text-anchor="middle">O</text>
<text class="node-sub root-text-sub" x="665" y="260" text-anchor="middle">occupancy</text>
</g>

<g>
<rect x="730" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="780" y="240" text-anchor="middle">U</text>
<text class="node-sub root-text-sub" x="780" y="260" text-anchor="middle">user spec</text>
</g>

<g>
<rect x="845" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="895" y="240" text-anchor="middle">F</text>
<text class="node-sub root-text-sub" x="895" y="260" text-anchor="middle">fleet spec</text>
</g>

<g>
<rect x="960" y="216" width="100" height="56" rx="10" class="root-fill"/>
<text class="node-title root-text-title" x="1010" y="240" text-anchor="middle">X</text>
<text class="node-sub root-text-sub" x="1010" y="260" text-anchor="middle">infra</text>
</g>

<line x1="180" y1="128" x2="90" y2="214" class="descriptor-edge" marker-end="url(#arrow)"/>
<line x1="220" y1="128" x2="205" y2="214" class="descriptor-edge" marker-end="url(#arrow)"/>
