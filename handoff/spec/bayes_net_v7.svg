<text class="node-title output-text-title" x="400" y="838" text-anchor="middle">events.csv</text>
</g>

<g>
<rect x="485" y="792" width="140" height="64" rx="10" class="output-fill"/>
<text class="node-title output-text-title" x="555" y="828" text-anchor="middle">sessions.csv</text>
</g>

<g>
<rect x="640" y="792" width="140" height="64" rx="10" class="output-fill"/>
