</g>

<g>
<rect x="950" y="792" width="140" height="64" rx="10" class="output-fill"/>
<text class="node-title output-text-title" x="1020" y="816" text-anchor="middle">chargers</text>
<text class="node-title output-text-title" x="1020" y="838" text-anchor="middle">.csv</text>
</g>

