<line x1="510" y1="128" x2="665" y2="214" class="descriptor-edge" marker-end="url(#arrow)"/>

<line x1="680" y1="128" x2="780" y2="214" class="descriptor-edge" marker-end="url(#arrow)"/>
<line x1="760" y1="128" x2="895" y2="214" class="descriptor-edge" marker-end="url(#arrow)"/>

<line x1="970" y1="128" x2="1010" y2="214" class="descriptor-edge" marker-end="url(#arrow)"/>

<text class="tier-label" x="40" y="332">Tier 1.5 — Per-entity instantiation</text>
<text class="tier-sub" x="40" y="350">One sample per car_id; downstream samplers parameterized from these</text>

<g>
<rect x="690" y="368" width="180" height="64" rx="10" class="entity-fill"/>
<text class="node-title entity-text-title" x="780" y="392" text-anchor="middle">A_user</text>
<text class="node-sub entity-text-sub" x="780" y="414" text-anchor="middle">per car: φ, κ, δ, w1, w2</text>
</g>

<g>
<rect x="880" y="368" width="180" height="64" rx="10" class="entity-fill"/>
<text class="node-title entity-text-title" x="970" y="392" text-anchor="middle">A_fleet</text>
<text class="node-sub entity-text-sub" x="970" y="414" text-anchor="middle">per car: battery, capacity</text>
</g>

<line x1="780" y1="272" x2="780" y2="366" class="entity-edge" marker-end="url(#arrow)"/>
<line x1="895" y1="272" x2="970" y2="366" class="entity-edge" marker-end="url(#arrow)"/>

<text class="tier-label" x="40" y="490">Tier 2 — Latent intermediates</text>
<text class="tier-sub" x="40" y="508">Sampled distributions; (f_arr, f_dwell) jointly via Gaussian copula</text>

<g>
<rect x="60" y="528" width="160" height="60" rx="10" class="latent-fill"/>
<text class="node-title latent-text-title" x="140" y="552" text-anchor="middle">L_flex</text>
<text class="node-sub latent-text-sub" x="140" y="572" text-anchor="middle">HVAC + water (E+)</text>
</g>

<g>
<rect x="240" y="528" width="160" height="60" rx="10" class="latent-fill"/>
<text class="node-title latent-text-title" x="320" y="552" text-anchor="middle">L_inflex</text>
<text class="node-sub latent-text-sub" x="320" y="572" text-anchor="middle">lights + plug (E+)</text>
</g>

<g>
<rect x="500" y="528" width="160" height="60" rx="10" class="latent-fill"/>
<text class="node-title latent-text-title" x="580" y="552" text-anchor="middle">f_arr</text>
<text class="node-sub latent-text-sub" x="580" y="572" text-anchor="middle">Bern(φ_v) × TruncNorm</text>
</g>

<g>
<rect x="680" y="528" width="160" height="60" rx="10" class="latent-fill"/>
<text class="node-title latent-text-title" x="760" y="552" text-anchor="middle">f_dwell</text>
<text class="node-sub latent-text-sub" x="760" y="572" text-anchor="middle">Weibull(φ_v, κ_v)</text>
</g>

<g>
<rect x="860" y="528" width="160" height="60" rx="10" class="latent-fill"/>
<text class="node-title latent-text-title" x="940" y="552" text-anchor="middle">f_soc</text>
<text class="node-sub latent-text-sub" x="940" y="572" text-anchor="middle">Beta(δ_v) shifted</text>
</g>

<text class="tier-label" x="40" y="754">Tier 3 — Output CSVs</text>
<text class="tier-sub" x="40" y="772">Deterministic given parents and seed; optional noise applied post-render</text>

<g>
<rect x="20" y="792" width="140" height="64" rx="10" class="output-fill"/>
<text class="node-title output-text-title" x="90" y="816" text-anchor="middle">building_</text>
<text class="node-title output-text-title" x="90" y="838" text-anchor="middle">load.csv</text>
</g>

<g>
<rect x="175" y="792" width="140" height="64" rx="10" class="output-fill"/>
